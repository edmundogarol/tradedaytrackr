<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Membership Cancelled - TradeDayTrackR</title>
  </head>

  <body
    style="
      margin: 0;
      padding: 0;
      background-color: #f4f6f8;
      font-family: Arial, Helvetica, sans-serif;
    "
  >
    <table
      width="100%"
      cellpadding="0"
      cellspacing="0"
      style="background-color: #f4f6f8; padding: 40px 0"
    >
      <tr>
        <td align="center">
          <table
            width="600"
            cellpadding="0"
            cellspacing="0"
            style="
              background: #ffffff;
              border-radius: 8px;
              padding: 40px;
              box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
            "
          >
            <!-- Logo -->
            <tr>
              <td align="center" style="padding-bottom: 25px">
                <img
                  src="https://tradedaytrackr-extra-assets.s3.us-west-2.amazonaws.com/logos/tradedaytrackr_black.svg"
                  alt="TradeDayTrackR"
                  width="220"
                  style="display: block"
                />
              </td>
            </tr>

            <!-- Title -->
            <tr>
              <td
                style="
                  font-size: 24px;
                  font-weight: bold;
                  color: #111;
                  text-align: center;
                  padding-bottom: 10px;
                "
              >
                Your Membership Has Been Cancelled
              </td>
            </tr>

            <!-- Message -->
            <tr>
              <td
                style="
                  font-size: 16px;
                  color: #444;
                  line-height: 1.6;
                  text-align: center;
                  padding: 10px 20px;
                "
              >
                Your <strong>TradeDayTrackR</strong> membership is no longer
                active.
              </td>
            </tr>

            <tr>
              <td
                style="
                  font-size: 16px;
                  color: #444;
                  line-height: 1.6;
                  text-align: center;
                  padding: 10px 20px;
                "
              >
                You no longer have access to premium features, but your progress
                and data remain safe and ready whenever you return.
              </td>
            </tr>

            <!-- CTA -->
            <tr>
              <td align="center" style="padding: 30px 0">
                <a
                  href="{{ url }}"
                  style="
                    background-color: #6c757d;
                    color: #ffffff;
                    padding: 14px 28px;
                    text-decoration: none;
                    border-radius: 6px;
                    font-weight: bold;
                    font-size: 16px;
                  "
                >
                  Visit Dashboard
                </a>
              </td>
            </tr>

            <!-- Footer -->
            <tr>
              <td
                style="
                  font-size: 13px;
                  color: #888;
                  text-align: center;
                  padding-top: 20px;
                "
              >
                We hope to see you again — your edge is always here 📈
              </td>
            </tr>

            <tr>
              <td
                style="
                  font-size: 13px;
                  color: #888;
                  text-align: center;
                  padding-top: 8px;
                "
              >
                © 2026 TradeDayTrackR
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
